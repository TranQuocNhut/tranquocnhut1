name: CI/CD Pipeline cho Java Spring Boot

# Yêu cầu: Mỗi khi Push code lên nhánh main
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push-docker-image:
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn (Checkout code)
        uses: actions/checkout@v4

      # Yêu cầu: Tự động đăng nhập vào Docker Hub (Sử dụng Secrets)
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Yêu cầu: Tự động Build Image từ Dockerfile (Sử dụng tags) và Push Image
      - name: Build và Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            tranquocnhut/duanjava:latest
            tranquocnhut/duanjava:${{ github.sha }}